<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Журнал расходов стройки</title>

<style>
:root {
  --bg: #f4f7fc;
  --card: #ffffff;
  --text: #1a2340;
  --muted: #5f6b85;
  --line: #e5e7eb;
  --line-strong: #d1d5db;
  --primary: #1d4ed8;
  --primary-hover: #1e40af;
  --primary-soft: #dbeafe;
  --danger: #eb7575;
  --danger-hover: #dd7272;
  --neutral: #5f708f;
  --neutral-hover: #4f607e;
  --shadow: 0 18px 45px rgba(166, 176, 200, 0.08);
}

* {
  box-sizing: border-box;
  font-family: inherit;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  color: var(--text);
  font-family: "Segoe UI", Tahoma, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  overflow-x: hidden;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 34rem),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 36rem);
}

.container {
  width: min(100% - 32px, 1280px);
  margin: 0 auto;
  padding: 28px 0 36px;
}

h2 {
  margin: 0 0 18px;
  color: #0f172a;
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 750;
  letter-spacing: -0.03em;
}

h3 {
  color: #0f172a;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.card {
  margin-bottom: 16px;
  padding: 18px;
  overflow-x: auto;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(226, 232, 240, 0.95);
  border-radius: 18px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(8px);
}

label {
  display: block;
  margin-bottom: 6px;
  color: #475569;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

input,
select {
  width: 100%;
  min-height: 40px;
  padding: 9px 11px;
  color: var(--text);
  font-size: 13px;
  background: #f8fafc;
  border: 1px solid var(--line);
  border-radius: 11px;
  outline: none;
  transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
}

input::placeholder {
  color: #94a3b8;
}

input:hover,
select:hover {
  border-color: #cbd5e1;
  background: #ffffff;
}

input:focus,
select:focus {
  background: #ffffff;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

button {
  min-height: 40px;
  padding: 9px 14px;
  border: 0;
  border-radius: 11px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, opacity 0.14s ease;
}

button:hover:not(:disabled) {
  transform: translateY(-1px);
}

button:active:not(:disabled) {
  transform: translateY(0);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.48;
}

.btn {
  color: #ffffff;
  background: #1d4ed8;
  box-shadow: 0 10px 20px rgba(29, 78, 216, 0.24);
}

.btn:hover:not(:disabled) {
  background: #1e40af;
  box-shadow: 0 12px 24px rgba(29, 78, 216, 0.30);
}

.btn-danger {
  min-height: 34px;
  padding: 7px 10px;
  color: #ffffff;
  background: var(--danger);
}

.btn-danger:hover:not(:disabled) {
  background: var(--danger-hover);
}

.btn-small-muted {
  min-height: 32px;
  padding: 6px 9px;
  color: #ffffff;
  font-size: 12px;
  border-radius: 9px;
  background: var(--neutral);
}

.btn-small-muted:hover:not(:disabled) {
  background: var(--neutral-hover);
}

.grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(135px, 1fr)) auto;
  gap: 12px;
  align-items: end;
}

table {
  width: 100%;
  max-width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #f8fafc;
}

th,
td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  text-align: left;
  vertical-align: middle;
  overflow: hidden;
  text-overflow: ellipsis;
  overflow-wrap: anywhere;
}

th {
  color: #64748b;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

th:nth-child(1),
td:nth-child(1):not([colspan]) {
  width: 104px;
  white-space: nowrap;
}

th:nth-child(2),
td:nth-child(2):not([colspan]) {
  width: 150px;
}

th:nth-child(3),
td:nth-child(3):not([colspan]) {
  width: 125px;
  white-space: nowrap;
}

th:nth-child(5),
td:nth-child(5):not([colspan]) {
  width: 130px;
}

th:nth-child(6),
td:nth-child(6):not([colspan]) {
  width: 245px;
  max-width: 245px;
  white-space: nowrap;
}

td:nth-child(6):not([colspan]) {
  padding: 6px 8px;
  overflow: hidden;
}

td:nth-child(6):not([colspan]) button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 26px;
  margin: 0 3px 0 0;
  padding: 4px 7px;
  font-size: 0;
  line-height: 1;
  white-space: nowrap;
  vertical-align: middle;
  box-shadow: none;
}

td:nth-child(6):not([colspan]) button::after {
  font-size: 11px;
  line-height: 1;
}

td:nth-child(6):not([colspan]) button:nth-child(1) {
  width: 54px;
}

td:nth-child(6):not([colspan]) button:nth-child(1)::after {
  content: "Катег.";
}

td:nth-child(6):not([colspan]) button:nth-child(2) {
  width: 52px;
}

td:nth-child(6):not([colspan]) button:nth-child(2)::after {
  content: "Сумма";
}

td:nth-child(6):not([colspan]) button:nth-child(3) {
  width: 70px;
}

td:nth-child(6):not([colspan]) button:nth-child(3)::after {
  content: "Коммент.";
}

td:nth-child(6):not([colspan]) button:nth-child(4) {
  width: 28px;
  margin-right: 0;
}

td:nth-child(6):not([colspan]) button:nth-child(4)::after {
  content: "×";
  font-size: 15px;
  line-height: 0.8;
}

tbody tr:not(.category-group-header):not(.category-subtotal):not(.grand-total-row):hover td {
  background: #fbfdff;
}

.summary {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  padding: 12px 14px;
  color: #0f172a;
  font-size: 15px;
  font-weight: 800;
  background: #e8f0ff;
  border: 1px solid #93c5fd;
  border-radius: 14px;
}

.summary span {
  color: #0b4fd8;
  font-size: 20px;
  font-weight: 900;
}

.category-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 10px;
  margin: 14px 0 0;
  padding: 0;
  list-style: none;
}

.category-summary li {
  margin: 0;
  padding: 12px 13px;
  color: #334155;
  background: #f8fafc;
  border: 1px solid var(--line);
  border-radius: 14px;
}

.actions-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.muted {
  color: var(--muted);
  font-size: 12px;
}

.category-summary li .share {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 64px;
  margin-right: 8px;
  padding: 3px 8px;
  color: #0f3fbd;
  font-weight: 800;
  background: #c7ddff;
  border: 1px solid #93b7ff;
  border-radius: 999px;
}

.category-group-header td {
  padding: 9px 10px;
  color: #0f172a;
  font-weight: 800;
  background: #eef2ff;
  border-top: 1px solid #c7d2fe;
  border-bottom: 1px solid #c7d2fe;
}

.category-subtotal td {
  color: #0f172a;
  font-weight: 800;
  background: #f8fafc;
  border-top: 1px solid var(--line-strong);
}

.grand-total-row td {
  color: #0f172a;
  font-size: 14px;
  font-weight: 900;
  background: #dbeafe;
  border-top: 2px solid #93c5fd;
}

@media (max-width: 1100px) {
  .grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .grid > button {
    width: 100%;
  }
}

@media (max-width: 760px) {
  .container {
    width: min(100% - 20px, 1280px);
    padding: 18px 0 28px;
  }

  .card {
    padding: 14px;
    border-radius: 16px;
  }

  .grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .grid > div,
  .grid > button {
    grid-column: 1 / -1 !important;
  }

  .actions-row {
    flex-direction: column;
  }

  .actions-row .btn {
    width: 100%;
  }

  .summary {
    width: 100%;
    justify-content: space-between;
  }

  .category-summary {
    grid-template-columns: 1fr;
  }

  th,
  td {
    padding: 9px 8px;
    font-size: 12px;
  }

  th:nth-child(1),
  td:nth-child(1):not([colspan]) {
    width: 86px;
  }

  th:nth-child(2),
  td:nth-child(2):not([colspan]) {
    width: 112px;
  }

  th:nth-child(3),
  td:nth-child(3):not([colspan]) {
    width: 104px;
  }

  th:nth-child(5),
  td:nth-child(5):not([colspan]) {
    width: 96px;
  }

  th:nth-child(6),
  td:nth-child(6):not([colspan]) {
    width: 210px;
    max-width: 210px;
  }

  td:nth-child(6):not([colspan]) button {
    min-height: 24px;
    margin-right: 2px;
    padding: 3px 5px;
  }

  td:nth-child(6):not([colspan]) button:nth-child(1) {
    width: 48px;
  }

  td:nth-child(6):not([colspan]) button:nth-child(2) {
    width: 48px;
  }

  td:nth-child(6):not([colspan]) button:nth-child(3) {
    width: 64px;
  }

  td:nth-child(6):not([colspan]) button:nth-child(4) {
    width: 24px;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Журнал расходов стройки</h2>

<div class="card">
  <div class="grid">

    <div>
      <label>Дата</label>
      <input type="date" id="date">
    </div>

    <div>
      <label>Категория</label>
      <select id="category">
        <option>Фундамент</option>
        <option>Коробка</option>
        <option>Кровля</option>
        <option>Окна</option>
        <option>Инженерия</option>
        <option>Отделка</option>
        <option>Участок</option>
        <option>Прочее</option>
      </select>
    </div>

    <div>
      <label>Сумма</label>
      <input type="number" id="amount" step="0.01" min="0.01">
    </div>

    <div>
      <label>Комментарий</label>
      <input type="text" id="comment" placeholder="что оплатили">
    </div>

    <div>
      <label>Кому</label>
      <input type="text" id="who" placeholder="подрядчик / магазин">
    </div>

    <div>
      <label>Подкатегория</label>
      <input type="text" id="subcategory" placeholder="например прочие расходы">
    </div>

    <button class="btn" onclick="add()">Добавить</button>

  </div>
</div>

<div class="card">
  <h3 style="margin-top:0">Договор по виду работ</h3>
  <div class="grid">
    <div>
      <label>Категория</label>
      <select id="contract-category" onchange="fillContractForm()">
        <option>Фундамент</option>
        <option>Коробка</option>
        <option>Кровля</option>
        <option>Окна</option>
        <option>Инженерия</option>
        <option>Отделка</option>
        <option>Участок</option>
        <option>Прочее</option>
      </select>
    </div>

    <div>
      <label>Сумма по договору</label>
      <input type="number" id="contract-total" step="0.01" min="0.01" placeholder="например 500000.00">
    </div>

    <div>
      <label>Срок оплаты до</label>
      <input type="date" id="contract-deadline">
    </div>

    <div style="grid-column: span 2;">
      <label>Комментарий к договору</label>
      <input type="text" id="contract-note" placeholder="условия, этап, примечание">
    </div>

    <button class="btn" onclick="saveContract()">Сохранить договор</button>
  </div>
  <div class="muted" style="margin-top:10px;">После внесения оплат по категории автоматически считается остаток по договору.</div>
</div>

<div class="card">
  <div class="summary">Итого стройка: <span id="total">0 ₽</span></div>
  <ul id="category-summary" class="category-summary"></ul>
  <div class="actions-row">
    <button class="btn" id="download-backup-btn" onclick="downloadBackup()">Скачать резервную копию</button>
    <button class="btn" onclick="openRestoreDialog()">Восстановить из копии</button>
    <input type="file" id="backup-file-input" accept="application/json,.json" style="display:none" onchange="handleBackupFile(event)">
  </div>
</div>

<div class="card">

<table>
  <thead>
    <tr>
      <th>Дата</th>
      <th>Категория</th>
      <th>Сумма</th>
      <th>Комментарий</th>
      <th>Кому</th>
      <th>Действия</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

</div>

</div>

<script>
let data = [];
let contracts = {};

const CATEGORIES = [
  "Фундамент",
  "Коробка",
  "Кровля",
  "Окна",
  "Инженерия",
  "Отделка",
  "Участок",
  "Прочее"
];

function save() {
  localStorage.setItem("build_costs", JSON.stringify(data));
}

function saveContracts() {
  localStorage.setItem("build_contracts", JSON.stringify(contracts));
}

function load() {
  const saved = localStorage.getItem("build_costs");
  if (saved) data = JSON.parse(saved);

  const savedContracts = localStorage.getItem("build_contracts");
  if (savedContracts) {
    try {
      const parsed = JSON.parse(savedContracts);
      contracts = parsed && typeof parsed === "object" ? parsed : {};
    } catch {
      contracts = {};
    }
  }
}

function format(n) {
  return new Intl.NumberFormat("ru-RU", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }).format(n) + " ₽";
}

function parseMoney(value) {
  return Number(String(value).replace(",", "."));
}

function buildBackupPayload() {
  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    source: "build_costs",
    items: data,
    contracts
  };
}

function getBackupFilename() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  const hh = String(now.getHours()).padStart(2, "0");
  const min = String(now.getMinutes()).padStart(2, "0");
  return `build-costs-backup-${yyyy}-${mm}-${dd}_${hh}-${min}.json`;
}

function updateBackupButtonState() {
  const backupBtn = document.getElementById("download-backup-btn");
  if (!backupBtn) return;
  backupBtn.disabled = data.length === 0;
  backupBtn.title = data.length === 0 ? "Нет данных для выгрузки" : "Скачать JSON-файл с резервной копией";
}

function downloadBackup() {
  if (data.length === 0) {
    alert("Нет данных для резервного копирования");
    return;
  }

  const payload = buildBackupPayload();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = getBackupFilename();
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function openRestoreDialog() {
  const fileInput = document.getElementById("backup-file-input");
  if (!fileInput) return;
  fileInput.value = "";
  fileInput.click();
}

function normalizeRestoredItem(item, index) {
  const amount = Number(item.amount);
  if (!item || typeof item !== "object") return null;
  if (typeof item.date !== "string" || !item.date) return null;
  if (typeof item.category !== "string" || !item.category) return null;
  if (!Number.isFinite(amount) || amount <= 0) return null;

  return {
    id: Number.isFinite(Number(item.id)) ? Number(item.id) : Date.now() + index,
    date: item.date,
    category: item.category,
    subcategory: typeof item.subcategory === "string" ? item.subcategory : "",
    amount,
    comment: typeof item.comment === "string" ? item.comment : "",
    who: typeof item.who === "string" ? item.who : ""
  };
}

function parseBackupContent(text) {
  const parsed = JSON.parse(text);
  const rawItems = Array.isArray(parsed) ? parsed : parsed?.items;
  const restoredContractsRaw = !Array.isArray(parsed) ? parsed?.contracts : undefined;

  if (!Array.isArray(rawItems)) {
    throw new Error("Файл не содержит список расходов");
  }

  const restoredItems = rawItems
    .map((item, index) => normalizeRestoredItem(item, index))
    .filter(Boolean);

  if (restoredItems.length === 0 && rawItems.length > 0) {
    throw new Error("В файле нет корректных записей для восстановления");
  }

  let restoredContracts = {};
  if (restoredContractsRaw && typeof restoredContractsRaw === "object") {
    Object.entries(restoredContractsRaw).forEach(([category, value]) => {
      if (!CATEGORIES.includes(category)) return;
      if (!value || typeof value !== "object") return;
      const total = Number(value.total);
      if (!Number.isFinite(total) || total <= 0) return;
      if (typeof value.deadline !== "string" || !value.deadline) return;

      restoredContracts[category] = {
        total,
        deadline: value.deadline,
        note: typeof value.note === "string" ? value.note : ""
      };
    });
  }

  return { restoredItems, restoredContracts };
}

function handleBackupFile(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const text = String(reader.result || "");
      const parsed = parseBackupContent(text);
      const shouldReplace = confirm(`Найдено записей: ${parsed.restoredItems.length}. Заменить текущие данные?`);
      if (!shouldReplace) return;

      data = parsed.restoredItems;
      contracts = parsed.restoredContracts;
      save();
      saveContracts();
      fillContractForm();
      render();
      alert("Данные успешно восстановлены");
    } catch (err) {
      const message = err instanceof Error ? err.message : "Не удалось прочитать файл";
      alert(`Ошибка восстановления: ${message}`);
    }
  };
  reader.onerror = () => {
    alert("Ошибка чтения файла");
  };
  reader.readAsText(file, "utf-8");
}

function add() {
  const amount = parseMoney(document.getElementById("amount").value);
  const item = {
    id: Date.now(),
    date: document.getElementById("date").value,
    category: document.getElementById("category").value,
    subcategory: document.getElementById("subcategory").value.trim(),
    amount,
    comment: document.getElementById("comment").value,
    who: document.getElementById("who").value
  };

  if (!item.date || !item.amount) {
    alert("Заполни дату и сумму");
    return;
  }

  data.push(item);

  document.getElementById("amount").value = "";
  document.getElementById("comment").value = "";
  document.getElementById("who").value = "";
  document.getElementById("subcategory").value = "";

  render();
  save();
}

function remove(id) {
  data = data.filter(x => x.id !== id);
  render();
  save();
}

function saveContract() {
  const category = document.getElementById("contract-category").value;
  const totalInput = document.getElementById("contract-total").value;
  const deadline = document.getElementById("contract-deadline").value;
  const note = document.getElementById("contract-note").value.trim();
  const total = parseMoney(totalInput);

  if (!Number.isFinite(total) || total <= 0) {
    alert("Введите корректную сумму договора больше 0");
    return;
  }

  if (!deadline) {
    alert("Укажите срок оплаты");
    return;
  }

  contracts[category] = {
    total,
    deadline,
    note
  };

  saveContracts();
  fillContractForm();
  render();
}

function fillContractForm() {
  const category = document.getElementById("contract-category").value;
  const contract = contracts[category];

  document.getElementById("contract-total").value = contract ? contract.total : "";
  document.getElementById("contract-deadline").value = contract ? contract.deadline : "";
  document.getElementById("contract-note").value = contract ? (contract.note || "") : "";
}

function editAmount(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;

  const input = prompt("Введите новую сумму:", item.amount);
  if (input === null) return;

  const newAmount = parseMoney(input);
  if (!Number.isFinite(newAmount) || newAmount <= 0) {
    alert("Введите корректную сумму больше 0");
    return;
  }

  item.amount = newAmount;
  render();
  save();
}

function editComment(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;

  const input = prompt("Измените комментарий:", item.comment || "");
  if (input === null) return;

  item.comment = input.trim();
  render();
  save();
}

function editCategory(id) {
  const item = data.find(x => x.id === id);
  if (!item) return;

  const categoryInput = prompt(
    `Измените основную категорию.\nДоступно: ${CATEGORIES.join(", ")}`,
    item.category
  );
  if (categoryInput === null) return;

  const newCategory = categoryInput.trim();
  if (!CATEGORIES.includes(newCategory)) {
    alert("Такой категории нет в списке. Используйте одну из доступных категорий.");
    return;
  }

  const subInput = prompt("Измените подкатегорию (можно оставить пусто):", item.subcategory || "");
  if (subInput === null) return;

  item.category = newCategory;
  item.subcategory = subInput.trim();
  render();
  save();
}

function getCategoryLabel(item) {
  if (!item.subcategory) return item.category;
  return `${item.category} / ${item.subcategory}`;
}

function formatDate(dateStr) {
  if (!dateStr) return "не указан";
  const d = new Date(dateStr);
  if (Number.isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString("ru-RU");
}

function render() {
  const table = document.getElementById("table");
  const categorySummary = document.getElementById("category-summary");
  table.innerHTML = "";
  categorySummary.innerHTML = "";

  let total = 0;
  const categoryAllPaid = {};
  const categoryContractPaid = {};
  const itemsByCategory = {};

  data.forEach(x => {
    total += x.amount;
    const hasSubcategory = Boolean((x.subcategory || "").trim());

    categoryAllPaid[x.category] = (categoryAllPaid[x.category] || 0) + x.amount;
    if (!hasSubcategory) {
      categoryContractPaid[x.category] = (categoryContractPaid[x.category] || 0) + x.amount;
    }

    if (!itemsByCategory[x.category]) itemsByCategory[x.category] = [];
    itemsByCategory[x.category].push(x);
  });

  const presentCategories = CATEGORIES.filter(
    cat => (itemsByCategory[cat] && itemsByCategory[cat].length > 0) || contracts[cat]
  );

  presentCategories.forEach(category => {
    const items = (itemsByCategory[category] || []).slice().sort((a, b) => {
      const dateDiff = new Date(a.date) - new Date(b.date);
      if (dateDiff !== 0) return dateDiff;
      return a.id - b.id;
    });

    const categoryTotal = categoryAllPaid[category] || 0;
    const percent = total ? ((categoryTotal / total) * 100).toFixed(1) : "0.0";

    table.innerHTML += `
      <tr class="category-group-header">
        <td colspan="6">${category} &mdash; (${percent}%)</td>
      </tr>
    `;

    if (items.length === 0) {
      table.innerHTML += `
        <tr>
          <td colspan="6" class="muted">Расходов пока нет, но есть договор по этой категории</td>
        </tr>
      `;
    } else {
      items.forEach(x => {
        table.innerHTML += `
          <tr>
            <td>${formatDate(x.date)}</td>
            <td>${getCategoryLabel(x)}</td>
            <td>${format(x.amount)}</td>
            <td>${x.comment || ""}</td>
            <td>${x.who || ""}</td>
            <td>
              <button class="btn-small-muted" onclick="editCategory(${x.id})">Изм. катег.</button>
              <button class="btn-small-muted" onclick="editAmount(${x.id})">Изм. сумму</button>
              <button class="btn-small-muted" onclick="editComment(${x.id})">Изм. коммент.</button>
              <button class="btn-danger" onclick="remove(${x.id})">X</button>
            </td>
          </tr>
        `;
      });
    }

    table.innerHTML += `
      <tr class="category-subtotal">
        <td colspan="2">Итого по категории «${category}»</td>
        <td>${format(categoryTotal)}</td>
        <td colspan="3" class="muted">доля в общей сумме: ${percent}%</td>
      </tr>
    `;
  });

  if (presentCategories.length > 0) {
    table.innerHTML += `
      <tr class="grand-total-row">
        <td colspan="2">Итого стройка</td>
        <td>${format(total)}</td>
        <td colspan="3">100.0%</td>
      </tr>
    `;
  }

  document.getElementById("total").innerText = format(total);

  presentCategories.forEach(category => {
    const allPaid = categoryAllPaid[category] || 0;
    const contractPaid = categoryContractPaid[category] || 0;
    const contract = contracts[category];
    const percent = total ? ((allPaid / total) * 100).toFixed(1) : "0.0";

    if (contract) {
      const remaining = Math.max(contract.total - contractPaid, 0);
      const extras = allPaid - contractPaid;
      const extraText = extras > 0 ? `, доп. расходы вне договора: ${format(extras)}` : "";
      categorySummary.innerHTML += `
        <li>
          <span class="share">(${percent}%)</span>${category}: оплачено ${format(contractPaid)} из ${format(contract.total)}, остаток ${format(remaining)}${extraText}, срок до ${formatDate(contract.deadline)}${contract.note ? `, примечание: ${contract.note}` : ""}
        </li>
      `;
      return;
    }

    categorySummary.innerHTML += `
      <li><span class="share">(${percent}%)</span>${category}: ${format(allPaid)}</li>
    `;
  });

  updateBackupButtonState();
}

load();
fillContractForm();
render();
</script>

</body>
</html>
